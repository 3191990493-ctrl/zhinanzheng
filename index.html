<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>地球磁场 · 国赛级全息演示 | 指南针原理</title>
    <style>
        :root {
            --bg: #010510;
            --panel-bg: rgba(4, 12, 28, 0.88);
            --text: #d8e8ff;
            --accent: #4aa8ff;
            --accent2: #ff5e7e;
            --gold: #ffc944;
            --border: rgba(80, 160, 255, 0.22);
            --radius: 15px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            background-image: radial-gradient(ellipse at 30% 35%, rgba(18, 70, 160, 0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 65% 55%, rgba(70, 20, 110, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 160, 220, 0.04) 0%, transparent 40%);
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 10px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(2, 10, 24, 0.65);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(80, 150, 240, 0.18);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-glow {
            font-size: 2rem;
            filter: drop-shadow(0 0 14px #4aa8ff);
            animation: logoFloat 3s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-3px);
            }
        }
        .title-text h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #d0e8ff, #8ec5ff, #5aa0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .title-text .sub {
            font-size: 0.62rem;
            color: #5a7ea8;
            letter-spacing: 0.09em;
            margin-top: 1px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn {
            background: rgba(20, 42, 75, 0.55);
            border: 1px solid rgba(100, 160, 240, 0.32);
            color: #c8ddf8;
            padding: 9px 17px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
            font-family: inherit;
            letter-spacing: 0.02em;
        }
        .btn:hover {
            background: rgba(38, 75, 155, 0.45);
            border-color: rgba(135, 195, 255, 0.65);
            color: #fff;
            box-shadow: 0 0 26px rgba(60, 145, 255, 0.38);
            transform: translateY(-1px);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn.accent {
            border-color: rgba(255, 105, 145, 0.5);
            background: rgba(65, 18, 35, 0.55);
        }
        .btn.accent:hover {
            box-shadow: 0 0 26px rgba(255, 80, 130, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(0.4);
        }
        .btn-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4af;
            animation: dotPulse 1.8s infinite;
        }
        .btn.accent .btn-dot {
            background: #ff5e7e;
            animation: dotPulseFast 0.8s infinite;
        }
        @keyframes dotPulse {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.8);
            }
        }
        @keyframes dotPulseFast {
            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(2.2);
            }
        }
        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid rgba(100, 160, 255, 0.2);
            color: #a0c0e0;
            width: 38px;
            height: 38px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .fullscreen-btn:hover {
            background: rgba(60, 145, 255, 0.14);
            border-color: rgba(105, 185, 255, 0.5);
            color: #fff;
        }
        .fullscreen-btn svg {
            width: 18px;
            height: 18px;
        }
        .canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        .canvas-container:active {
            cursor: grabbing;
        }
        .hint-tag {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(170, 210, 250, 0.75);
            background: rgba(0, 10, 26, 0.6);
            padding: 6px 18px;
            border-radius: 30px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 160, 255, 0.18);
            z-index: 35;
            pointer-events: none;
            transition: opacity 2s;
        }
        .status-bar {
            position: fixed;
            top: 76px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: rgba(210, 230, 255, 0.9);
            background: rgba(0, 12, 32, 0.65);
            padding: 6px 18px;
            border-radius: 22px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 160, 255, 0.22);
            z-index: 36;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        .status-bar.visible {
            opacity: 1;
        }
        @media (max-width:768px) {
            .btn {
                padding: 7px 11px;
                font-size: 0.66rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="logo-glow">🌐</span>
            <div class="title-text">
                <h1>GEOMAGNETIC FIELD · 指南针原理</h1>
                <div class="sub">外部N极↑指向地理北极 | 内部N极↓指向地理南极</div>
            </div>
        </div>
        <div class="header-right">
            <button class="btn" id="magnetBtn"><span id="btnLabel">磁针靠近</span><span class="btn-dot"></span></button>
            <button class="btn" id="resetBtn">重置</button>
            <button class="fullscreen-btn" id="fullscreenToggle">
                <svg id="fsIconExpand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 3 21 3 21 9" /><polyline points="9 21 3 21 3 15" /></svg>
                <svg id="fsIconShrink" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="display:none;"><polyline points="4 8 4 3 9 3" /><polyline points="20 16 20 21 15 21" /></svg>
            </button>
        </div>
    </div>
    <div class="status-bar" id="statusBar"></div>
    <div class="canvas-container" id="threeContainer">
        <div class="hint-tag" id="hintTag">🖱 拖拽磁针 | 滚轮缩放 | 右键平移 | R 自动旋转 | M 动画</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // ==================== DOM 引用 ====================
        const container = document.getElementById('threeContainer');
        const statusBar = document.getElementById('statusBar');
        const magnetBtn = document.getElementById('magnetBtn');
        const resetBtn = document.getElementById('resetBtn');
        const btnLabel = document.getElementById('btnLabel');
        const fullscreenBtn = document.getElementById('fullscreenToggle');
        const fsExpand = document.getElementById('fsIconExpand');
        const fsShrink = document.getElementById('fsIconShrink');
        const hintTag = document.getElementById('hintTag');

        // ==================== 场景初始化 ====================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010510, 0.000015);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.85;
        container.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / Math.max(window.innerHeight, 1), 0.1, 80);
        camera.position.set(2.8, 1.3, 3.5);
        camera.lookAt(0, 0.1, 0);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.45, 0.12, 0.04);
        bloomPass.threshold = 0.12;
        bloomPass.strength = 0.65;
        bloomPass.radius = 0.55;
        composer.addPass(bloomPass);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(0, 0.12, 0);
        controls.minDistance = 1.5;
        controls.maxDistance = 9;
        controls.maxPolarAngle = Math.PI * 0.78;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        controls.update();

        // 光照
        scene.add(new THREE.AmbientLight(0x334466, 1.4));
        scene.add(new THREE.HemisphereLight(0x7788aa, 0x1a2a44, 0.95));
        const sunLight = new THREE.DirectionalLight(0xfffff0, 1.7);
        sunLight.position.set(8, 4, 6);
        scene.add(sunLight);
        const fillLight = new THREE.DirectionalLight(0x8899cc, 0.55);
        fillLight.position.set(-4, -1, -3);
        scene.add(fillLight);

        // 星空
        const starsGeo = new THREE.BufferGeometry();
        const starCount = 1600;
        const sp = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const theta = Math.random() * Math.PI * 2,
                phi = Math.acos(2 * Math.random() - 1),
                r = 10 + Math.random() * 16;
            sp[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            sp[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            sp[i * 3 + 2] = r * Math.cos(phi);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
        scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0x8899cc, size: 0.02, blending: THREE
                .AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.8 })));

        // ==================== 地球与磁场常量 ====================
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);
        const EARTH_RADIUS = 1.0;
        const MAGNETIC_TILT = 11.5 * (Math.PI / 180);
        const magAxisDir = new THREE.Vector3(0, Math.cos(MAGNETIC_TILT), -Math.sin(MAGNETIC_TILT)).normalize();
        const magSPole = magAxisDir.clone().multiplyScalar(EARTH_RADIUS * 0.92);
        const magNPole = magAxisDir.clone().multiplyScalar(-EARTH_RADIUS * 0.92);

        const textureLoader = new THREE.TextureLoader();

        // 地球主体
        const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 128, 96);
        const earthMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.78, metalness: 0.02 });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        earthGroup.add(earthMesh);
        textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg', map => {
            map.colorSpace = THREE.SRGBColorSpace;
            earthMat.map = map;
            earthMat.needsUpdate = true;
        });

        // 云层
        const cloudGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.012, 72, 54);
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.17, blending: THREE
                .AdditiveBlending, depthWrite: false, roughness: 1.0 });
        const cloudMesh = new THREE.Mesh(cloudGeo, cloudMat);
        const cloudGroup = new THREE.Group();
        cloudGroup.add(cloudMesh);
        earthGroup.add(cloudGroup);
        textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png', map => {
            cloudMat.alphaMap = map;
            cloudMat.opacity = 0.22;
            cloudMat.needsUpdate = true;
        });

        // 大气光晕
        const atmoGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.04, 64, 48);
        const atmoMat = new THREE.ShaderMaterial({
            uniforms: { uColor: { value: new THREE.Color('#5599cc') } },
            vertexShader: `varying vec3 vN; varying vec3 vW; void main(){ vec4 w=modelMatrix*vec4(position,1.); vW=w.xyz; vN=normalize(mat3(modelMatrix)*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
            fragmentShader: `varying vec3 vN; varying vec3 vW; uniform vec3 uColor; void main(){ vec3 v=normalize(cameraPosition-vW); float f=1.-abs(dot(v,vN)); gl_FragColor=vec4(uColor,pow(f,4.)*.2); }`,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });
        earthGroup.add(new THREE.Mesh(atmoGeo, atmoMat));

        // 线框与网格
        const wfMat = new THREE.MeshBasicMaterial({ color: 0x1a3a6a, wireframe: true, transparent: true, opacity: 0.05,
            depthWrite: false });
        earthGroup.add(new THREE.Mesh(new THREE.SphereGeometry(EARTH_RADIUS * 1.002, 72, 48), wfMat));
        const gridMat = new THREE.MeshBasicMaterial({ color: 0x3a6ea5, transparent: true, opacity: 0.13, depthWrite: false });
        [-30, 0, 30].forEach(ld => {
            const lat = ld * Math.PI / 180,
                r = EARTH_RADIUS * Math.cos(lat),
                y = EARTH_RADIUS * Math.sin(lat);
            const t = new THREE.Mesh(new THREE.TorusGeometry(r, 0.002, 8, 120), gridMat);
            t.position.y = y;
            t.rotation.x = Math.PI / 2;
            earthGroup.add(t);
        });
        [0, 60, 120, 180, 240, 300].forEach(ld => {
            const lon = ld * Math.PI / 180;
            const t = new THREE.Mesh(new THREE.TorusGeometry(EARTH_RADIUS, 0.002, 8, 120), gridMat);
            t.rotation.y = lon;
            t.rotation.x = Math.PI / 2;
            earthGroup.add(t);
        });

        // 极点标记
        const mkPole = (c, p) => {
            const g = new THREE.Group();
            g.add(new THREE.Mesh(new THREE.SphereGeometry(0.04, 24), new THREE.MeshStandardMaterial({ color: c,
                emissive: c, emissiveIntensity: 1.4, roughness: 0.2 })));
            const ri = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.008, 16, 32), new THREE.MeshBasicMaterial({ color: c,
                transparent: true, opacity: 0.55, depthWrite: false }));
            ri.rotation.x = Math.PI / 2;
            g.add(ri);
            g.position.copy(p);
            return g;
        };
        earthGroup.add(mkPole(0xffffff, new THREE.Vector3(0, EARTH_RADIUS + 0.03, 0)));
        earthGroup.add(mkPole(0xcccccc, new THREE.Vector3(0, -EARTH_RADIUS - 0.03, 0)));

        // 地磁南极（红色，地理北极附近）
        const magSouthGroup = new THREE.Group();
        magSouthGroup.position.copy(magSPole);
        magSouthGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.06, 28), new THREE.MeshStandardMaterial({ color: 0xff4060,
            emissive: 0xff2040, emissiveIntensity: 2.4, roughness: 0.1 })));
        const magSRing = new THREE.Mesh(new THREE.TorusGeometry(0.085, 0.012, 16, 32), new THREE.MeshBasicMaterial({ color: 0xff4060,
            transparent: true, opacity: 0.75, depthWrite: false }));
        magSRing.rotation.x = Math.PI / 2;
        magSouthGroup.add(magSRing);
        earthGroup.add(magSouthGroup);

        // 地磁北极（蓝色，地理南极附近）
        const magNorthGroup = new THREE.Group();
        magNorthGroup.position.copy(magNPole);
        magNorthGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.06, 28), new THREE.MeshStandardMaterial({ color: 0x33ccff,
            emissive: 0x2299dd, emissiveIntensity: 2.4, roughness: 0.1 })));
        const magNRing = new THREE.Mesh(new THREE.TorusGeometry(0.085, 0.012, 16, 32), new THREE.MeshBasicMaterial({ color: 0x33ccff,
            transparent: true, opacity: 0.75, depthWrite: false }));
        magNRing.rotation.x = Math.PI / 2;
        magNorthGroup.add(magNRing);
        earthGroup.add(magNorthGroup);

        // 磁轴棒
        const barGroup = new THREE.Group();
        earthGroup.add(barGroup);
        const barLen = EARTH_RADIUS * 1.4;
        const barCyl = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, barLen, 10), new THREE.MeshStandardMaterial({ color: 0x778899,
            roughness: 0.25, metalness: 0.7, emissive: 0x111122, emissiveIntensity: 0.5 }));
        const quat0 = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), magAxisDir);
        barCyl.setRotationFromQuaternion(quat0);
        barGroup.add(barCyl);
        barGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.035, 14), new THREE.MeshStandardMaterial({ color: 0xff3333,
            emissive: 0xff0000, emissiveIntensity: 2.2, roughness: 0.1 })).translateOnAxis(magAxisDir, -EARTH_RADIUS *
            0.92));
        barGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.035, 14), new THREE.MeshStandardMaterial({ color: 0x3366ff,
            emissive: 0x2244cc, emissiveIntensity: 2.2, roughness: 0.1 })).translateOnAxis(magAxisDir, EARTH_RADIUS * 0.92));

        // ==================== 地球标签：地磁南极(地理北极) 与 地磁北极(地理南极) ====================
        function createTextSprite(text, color = '#ffffff', scale = 0.8) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color;
            ctx.font = 'bold 36px "Inter", "PingFang SC", "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 256, 64);
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            const material = new THREE.SpriteMaterial({ map: texture, depthTest: false, depthWrite: false });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(scale, scale * 0.25, 1);
            return sprite;
        }

        const labelGeoNorth = createTextSprite('地磁南极 (地理北极)', '#ff8888', 0.9);
        labelGeoNorth.position.set(0, EARTH_RADIUS + 0.4, 0);
        earthGroup.add(labelGeoNorth);

        const labelGeoSouth = createTextSprite('地磁北极 (地理南极)', '#8888ff', 0.9);
        labelGeoSouth.position.set(0, -EARTH_RADIUS - 0.4, 0);
        earthGroup.add(labelGeoSouth);

        // ==================== 磁场线（带方向箭头）【方向修正：从地磁北极指向地磁南极】 ====================
        const fieldLinesGroup = new THREE.Group();
        earthGroup.add(fieldLinesGroup);
        const arrowGeo = new THREE.ConeGeometry(0.03, 0.08, 6);
        const allFieldPaths = [];
        const rMaxVals = [1.12, 1.25, 1.45, 1.7, 2.1, 2.7, 3.5];
        const phiCnt = 8;
        rMaxVals.forEach((rMax, ri) => {
            const opacity = 0.2 + (ri / (rMaxVals.length - 1)) * 0.32;
            const color = new THREE.Color().setHSL(0.54 + ri * 0.04, 0.5, 0.32 + ri * 0.08);
            const lineMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, depthWrite: true });
            for (let p = 0; p < phiCnt; p++) {
                const phi = (p / phiCnt) * Math.PI * 2;
                const pts = [];
                const tMin = Math.asin(Math.sqrt(EARTH_RADIUS / (rMax + 0.01)));
                const tMax = Math.PI - tMin;
                for (let i = 180; i >= 0; i--) {
                    const theta = tMin + (i / 180) * (tMax - tMin);
                    const r = rMax * Math.sin(theta) * Math.sin(theta);
                    const x = r * Math.sin(theta) * Math.cos(phi);
                    const y = r * Math.sin(theta) * Math.sin(phi);
                    const z = r * Math.cos(theta);
                    pts.push(new THREE.Vector3(x, z, y).applyQuaternion(quat0));
                }
                if (pts.length >= 2) {
                    allFieldPaths.push(pts);
                    const curve = new THREE.CatmullRomCurve3(pts);
                    const tubeGeo = new THREE.TubeGeometry(curve, 140, 0.003 + ri * 0.0007, 8, false);
                    fieldLinesGroup.add(new THREE.Mesh(tubeGeo, lineMat));
                    const midT = 0.5;
                    const point = curve.getPointAt(midT);
                    const tangent = curve.getTangentAt(midT).normalize();
                    const arrow = new THREE.Mesh(arrowGeo, new THREE.MeshBasicMaterial({ color, transparent: true,
                        opacity: 0.8, depthWrite: true }));
                    arrow.position.copy(point);
                    arrow.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), tangent);
                    fieldLinesGroup.add(arrow);
                }
            }
        });

        // 磁场线粒子
        const particlesGroup = new THREE.Group();
        earthGroup.add(particlesGroup);
        const particleGeo = new THREE.SphereGeometry(0.014, 6, 4);
        const allParticles = [];
        allFieldPaths.forEach((pts) => {
            const count = 8 + Math.floor(Math.random() * 8);
            for (let i = 0; i < count; i++) {
                const t = i / count;
                const mat = new THREE.MeshBasicMaterial({ color: 0xee5555, transparent: true, opacity: 0.8,
                    depthWrite: true });
                const particle = new THREE.Mesh(particleGeo, mat);
                particle.position.copy(getPointOnPath(pts, t));
                particle.userData = { path: pts, t, speed: 0.00028 + Math.random() * 0.00095 };
                particlesGroup.add(particle);
                allParticles.push(particle);
            }
        });

        function getPointOnPath(path, t) {
            if (path.length < 2) return path[0].clone();
            const seg = path.length - 1,
                fi = t * seg,
                i0 = Math.floor(fi),
                i1 = Math.min(i0 + 1, path.length - 1);
            return new THREE.Vector3().lerpVectors(path[i0], path[i1], fi - i0);
        }

        const scanRing = new THREE.Mesh(new THREE.TorusGeometry(EARTH_RADIUS * 1.22, 0.005, 16, 120),
            new THREE.MeshBasicMaterial({ color: 0x4aa8ff, transparent: true, opacity: 0.35, depthWrite: false }));
        scanRing.rotation.x = Math.PI / 2;
        earthGroup.add(scanRing);

        const fadeMats = [];
        earthGroup.traverse(c => {
            if (c === fieldLinesGroup || c === particlesGroup) return;
            if (c.material) {
                if (Array.isArray(c.material)) c.material.forEach(m => { if (m && !fadeMats.includes(m))
                        fadeMats.push(m); });
                else if (!fadeMats.includes(c.material)) fadeMats.push(c.material);
            }
        });
        const origOpMap = new Map();
        fadeMats.forEach(m => origOpMap.set(m, m.opacity !== undefined ? m.opacity : 1.0));

        // ==================== 磁针（指南针） ====================
        const needleGroup = new THREE.Group();
        const NEEDLE_INIT_X = 2.8,
            NEEDLE_INIT_Y = 0.05,
            NEEDLE_INIT_Z = -0.6;
        needleGroup.position.set(NEEDLE_INIT_X, NEEDLE_INIT_Y, NEEDLE_INIT_Z);

        const DIR_UP = new THREE.Vector3(0, 1, 0);
        const DIR_DOWN = new THREE.Vector3(0, -1, 0);
        const INITIAL_QUAT = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), DIR_UP);
        needleGroup.quaternion.copy(INITIAL_QUAT);

        // N极锥体（红色，上方）
        const nCone = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.5, 32, 4), new THREE.MeshStandardMaterial({ color: 0xe83040,
            emissive: 0x801020, emissiveIntensity: 2.0, roughness: 0.12, metalness: 0.7 }));
        nCone.position.y = 0.25;
        needleGroup.add(nCone);

        // S极锥体（蓝色，下方）
        const sCone = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.5, 32, 4), new THREE.MeshStandardMaterial({ color: 0x2860dd,
            emissive: 0x0c1a50, emissiveIntensity: 2.0, roughness: 0.12, metalness: 0.7 }));
        sCone.position.y = -0.25;
        sCone.rotation.z = Math.PI;
        needleGroup.add(sCone);

        const centerSphere = new THREE.Mesh(new THREE.SphereGeometry(0.08, 40, 32), new THREE.MeshStandardMaterial({ color: 0xffc840,
            emissive: 0x997000, emissiveIntensity: 2.8, roughness: 0.06, metalness: 0.95 }));
        needleGroup.add(centerSphere);
        const gimbalOuter = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.018, 20, 56), new THREE.MeshStandardMaterial({ color: 0xddc080,
            emissive: 0x443000, emissiveIntensity: 1.4, roughness: 0.15, metalness: 0.85 }));
        needleGroup.add(gimbalOuter);
        const gimbalInner = new THREE.Mesh(new THREE.TorusGeometry(0.095, 0.01, 16, 44), new THREE.MeshStandardMaterial({ color: 0xeedd99,
            emissive: 0x332200, emissiveIntensity: 1.1, roughness: 0.12, metalness: 0.9 }));
        gimbalInner.rotation.x = Math.PI / 2;
        needleGroup.add(gimbalInner);
        const decoRing = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.004, 8, 60), new THREE.MeshBasicMaterial({ color: 0xaaccff,
            transparent: true, opacity: 0.55, depthWrite: false }));
        needleGroup.add(decoRing);

        // N极尖端（红色）
        const nTip = new THREE.Mesh(new THREE.SphereGeometry(0.034, 18, 12), new THREE.MeshBasicMaterial({ color: 0xff5577,
            transparent: true, opacity: 0.9, depthWrite: false }));
        nTip.position.y = 0.5;
        needleGroup.add(nTip);

        // S极尖端（蓝色）
        const sTip = new THREE.Mesh(new THREE.SphereGeometry(0.034, 18, 12), new THREE.MeshBasicMaterial({ color: 0x5588ff,
            transparent: true, opacity: 0.9, depthWrite: false }));
        sTip.position.y = -0.5;
        needleGroup.add(sTip);

        // 装饰粒子
        const needleParticlesG = new THREE.Group();
        needleGroup.add(needleParticlesG);
        for (let i = 0; i < 24; i++) {
            const mat = new THREE.MeshBasicMaterial({ color: i < 12 ? 0xff8888 : 0x88aaff, transparent: true, opacity: 0.45 +
                    Math.random() * 0.5, depthWrite: false });
            const pm = new THREE.Mesh(new THREE.SphereGeometry(0.012, 4, 3), mat);
            const angle = (i / 24) * Math.PI * 2,
                dist = 0.14 + Math.random() * 0.1;
            pm.position.set(Math.cos(angle) * dist, (Math.random() - 0.5) * 0.85, Math.sin(angle) * dist);
            pm.userData = { base: pm.position.clone(), phase: Math.random() * Math.PI * 2, speed: 1.3 + Math.random() * 3.0 };
            needleParticlesG.add(pm);
        }

        // 标签N（红色锥体上方）、标签S（蓝色锥体下方）
        function createLabelSprite(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 48px "Inter", "PingFang SC", "Microsoft YaHei"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 32, 32);
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            const material = new THREE.SpriteMaterial({ map: texture, depthTest: false, depthWrite: false });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(0.25, 0.25, 1);
            return sprite;
        }
        const labelN = createLabelSprite('N');
        labelN.position.set(0, 0.65, 0);
        needleGroup.add(labelN);
        const labelS = createLabelSprite('S');
        labelS.position.set(0, -0.65, 0);
        needleGroup.add(labelS);

        needleGroup.scale.set(2, 2, 2);
        scene.add(needleGroup);

        // ==================== 磁场计算 ====================
        function getFieldAt(worldPos) {
            const rVec = worldPos.clone();
            const r = rVec.length();
            if (r < 0.08) return { dir: new THREE.Vector3(0, 1, 0), strength: 10 };
            const rDir = rVec.normalize();
            const worldMagAxis = magAxisDir.clone().applyQuaternion(earthGroup.quaternion).normalize();
            const mDotR = worldMagAxis.dot(rDir);
            const B = rDir.clone().multiplyScalar(3 * mDotR).sub(worldMagAxis);
            return { dir: B.normalize(), strength: Math.min((1 / (r * r * r)) * 0.35, 8) };
        }

        // ==================== 磁针物理 ====================
        const needlePhysics = {
            angularVelocity: new THREE.Vector3(),
            momentOfInertia: 0.04,
            damping: 3.5,
            magneticMoment: 1.8,
            getWorldMagneticMoment() {
                return new THREE.Vector3(0, this.magneticMoment, 0).applyQuaternion(needleGroup.quaternion);
            }
        };

        function updateNeedlePhysics(dt) {
            if (needleDragging) return;
            if (animState.current === 'merged' || animState.current.startsWith('transitioning')) return;
            const worldPos = new THREE.Vector3();
            needleGroup.getWorldPosition(worldPos);
            const field = getFieldAt(worldPos);
            const B = field.dir.clone().multiplyScalar(field.strength);
            const mWorld = needlePhysics.getWorldMagneticMoment();
            const torque = new THREE.Vector3().crossVectors(mWorld, B);
            const alpha = torque.clone().multiplyScalar(1 / needlePhysics.momentOfInertia);
            const dampedOmega = needlePhysics.angularVelocity.clone().multiplyScalar(Math.exp(-needlePhysics.damping * dt));
            needlePhysics.angularVelocity.copy(dampedOmega).add(alpha.multiplyScalar(dt));
            const maxOmega = 15;
            if (needlePhysics.angularVelocity.length() > maxOmega) needlePhysics.angularVelocity.normalize().multiplyScalar(
                maxOmega);
            const omegaMag = needlePhysics.angularVelocity.length();
            if (omegaMag > 0.0001) {
                const axis = needlePhysics.angularVelocity.clone().normalize();
                const angle = omegaMag * dt;
                needleGroup.quaternion.premultiply(new THREE.Quaternion().setFromAxisAngle(axis, angle)).normalize();
            }
        }

        // ==================== 拖拽交互 ====================
        const raycaster = new THREE.Raycaster();
        let needleDragging = false;
        let dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0),
            dragOffset = new THREE.Vector3();
        const draggables = [nCone, sCone, centerSphere, gimbalOuter, gimbalInner, nTip, sTip, decoRing];

        function getIntersection(event) {
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            return raycaster.intersectObjects(draggables, true);
        }

        container.addEventListener('pointerdown', (event) => {
            if (event.button !== 0) return;
            if (animState.current === 'merged' || animState.current.startsWith('transitioning')) return;
            if (getIntersection(event).length > 0) {
                needleDragging = true;
                controls.enabled = false;
                const pt = getIntersection(event)[0].point;
                dragPlane.setFromNormalAndCoplanarPoint(camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(
                    -1), pt);
                needleGroup.getWorldPosition(dragOffset);
                dragOffset.sub(pt);
                needlePhysics.angularVelocity.set(0, 0, 0);
                statusBar.textContent = '🔴 拖拽中…释放以恢复物理模拟';
                statusBar.classList.add('visible');
            }
        });
        window.addEventListener('pointermove', (event) => {
            if (!needleDragging) return;
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersection = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(dragPlane, intersection)) needleGroup.position.copy(intersection.add(
                dragOffset));
        });
        window.addEventListener('pointerup', () => {
            if (needleDragging) { needleDragging = false;
                controls.enabled = true;
                statusBar.classList.remove('visible'); }
        });

        // ==================== 动画状态机（平滑直线移动） ====================
        const MERGED_QUAT = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), DIR_DOWN);
        const animState = {
            current: 'idle',
            transitionProgress: 0,
            transitionDuration: 2.0,
            transitionStartPos: new THREE.Vector3(),
            transitionStartQuat: new THREE.Quaternion(),
            earthOpacity: 1.0,
            mergePos: new THREE.Vector3(0.22, 0.16, -0.1),
            idlePos: new THREE.Vector3(NEEDLE_INIT_X, NEEDLE_INIT_Y, NEEDLE_INIT_Z),
            flash: 0,
            oscAmp: 0,
            settleTimer: 0,
        };

        function updateBtnUI() {
            if (animState.current === 'merged') {
                btnLabel.textContent = '磁针返回';
                magnetBtn.classList.add('accent');
                magnetBtn.disabled = false;
            } else if (animState.current.startsWith('transitioning')) {
                btnLabel.textContent = animState.current === 'transitioning_in' ? '进入中…' : '返回中…';
                magnetBtn.classList.remove('accent');
                magnetBtn.disabled = true;
            } else {
                btnLabel.textContent = '磁针靠近';
                magnetBtn.classList.remove('accent');
                magnetBtn.disabled = false;
            }
        }

        function startTransitionIn() {
            if (needleDragging) return;
            if (animState.current === 'merged' || animState.current === 'transitioning_in') return;
            needleGroup.getWorldPosition(animState.transitionStartPos);
            animState.transitionStartQuat.copy(needleGroup.quaternion);
            animState.transitionProgress = 0;
            animState.current = 'transitioning_in';
            animState.flash = 0;
            animState.oscAmp = 0;
            animState.settleTimer = 0;
            needlePhysics.angularVelocity.set(0, 0, 0);
            updateBtnUI();
            statusBar.textContent = '🌍 磁针正在平移进入地球内部…';
            statusBar.classList.add('visible');
        }

        function startTransitionOut() {
            if (needleDragging) return;
            if (animState.current === 'idle' || animState.current === 'transitioning_out') return;
            animState.transitionStartPos.copy(animState.mergePos);
            animState.transitionStartQuat.copy(MERGED_QUAT);
            animState.transitionProgress = 0;
            animState.current = 'transitioning_out';
            animState.flash = 0;
            animState.oscAmp = 0;
            animState.settleTimer = 0;
            needlePhysics.angularVelocity.set(0, 0, 0);
            updateBtnUI();
            statusBar.textContent = '🚀 磁针正在平移返回外部…';
            statusBar.classList.add('visible');
        }

        magnetBtn.addEventListener('click', () => {
            if (animState.current === 'idle') startTransitionIn();
            else if (animState.current === 'merged') startTransitionOut();
        });

        resetBtn.addEventListener('click', () => {
            if (needleDragging) return;
            if (animState.current === 'merged') {
                startTransitionOut();
            } else if (animState.current === 'idle') {
                needleGroup.position.copy(animState.idlePos);
                needleGroup.quaternion.copy(INITIAL_QUAT);
                needlePhysics.angularVelocity.set(0, 0, 0);
                animState.earthOpacity = 1.0;
                animState.flash = 0;
                animState.oscAmp = 0;
                updateBtnUI();
                statusBar.textContent = '✅ 磁针已重置到初始位置';
                statusBar.classList.add('visible');
                setTimeout(() => statusBar.classList.remove('visible'), 1800);
            }
        });

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        const clock = new THREE.Clock();
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.12);
            time += dt;

            controls.update();
            earthGroup.rotation.y += dt * 0.12;
            cloudGroup.rotation.y += dt * 0.03;

            allParticles.forEach(p => {
                p.userData.t += p.userData.speed;
                if (p.userData.t > 1) p.userData.t -= 1;
                p.position.copy(getPointOnPath(p.userData.path, p.userData.t));
                const tVal = p.userData.t;
                p.material.color.setRGB(1 - tVal, 0.2 + tVal * 0.2, 0.28 + tVal * 0.6);
                p.material.opacity = 0.5 + tVal * 0.45;
            });

            magSRing.scale.setScalar(1 + Math.sin(time * 3.2) * 0.3);
            magNRing.scale.setScalar((1 + Math.sin(time * 3.2) * 0.3) * 0.9);
            scanRing.rotation.z += dt * 0.28;
            scanRing.material.opacity = 0.26 + Math.sin(time * 3.5) * 0.1;

            needleParticlesG.children.forEach(p => {
                const ud = p.userData;
                p.position.copy(ud.base);
                p.position.y += Math.sin(time * ud.speed + ud.phase) * 0.05;
                p.material.opacity = 0.3 + Math.abs(Math.sin(time * ud.speed + ud.phase)) * 0.55;
            });

            nTip.scale.setScalar(1 + Math.sin(time * 5) * 0.4);
            sTip.scale.setScalar((1 + Math.cos(time * 5) * 0.4) * 0.85);
            gimbalOuter.rotation.z += dt * 0.35;
            gimbalInner.rotation.x += dt * 0.3;
            decoRing.rotation.x += dt * 0.22;
            decoRing.rotation.z -= dt * 0.28;

            if (animState.current === 'transitioning_in') {
                animState.transitionProgress += dt / animState.transitionDuration;
                if (animState.transitionProgress >= 1) {
                    animState.transitionProgress = 1;
                    animState.current = 'merged';
                    animState.earthOpacity = 0.25;
                    animState.flash = 0.4;
                    animState.oscAmp = 0;
                    animState.settleTimer = 0;
                    needleGroup.position.copy(animState.mergePos);
                    needleGroup.quaternion.copy(MERGED_QUAT);
                    needlePhysics.angularVelocity.set(0, 0, 0);
                    updateBtnUI();
                    statusBar.textContent = '📍 磁针已锁定在地球内部 | N极朝下·S极朝上';
                    statusBar.classList.add('visible');
                    setTimeout(() => statusBar.classList.remove('visible'), 3000);
                } else {
                    const progress = animState.transitionProgress;
                    const easedProgress = easeInOutCubic(progress);
                    needleGroup.position.lerpVectors(animState.transitionStartPos, animState.mergePos, easedProgress);
                    needleGroup.quaternion.slerpQuaternions(animState.transitionStartQuat, MERGED_QUAT, easedProgress)
                        .normalize();
                    animState.earthOpacity = 1 - easedProgress * 0.75;
                }
            } else if (animState.current === 'transitioning_out') {
                animState.transitionProgress += dt / animState.transitionDuration;
                if (animState.transitionProgress >= 1) {
                    animState.transitionProgress = 0;
                    animState.current = 'idle';
                    animState.earthOpacity = 1.0;
                    animState.flash = 0;
                    animState.oscAmp = 0;
                    needleGroup.position.copy(animState.idlePos);
                    needleGroup.quaternion.copy(INITIAL_QUAT);
                    needlePhysics.angularVelocity.set(0, 0, 0);
                    updateBtnUI();
                    statusBar.textContent = '✅ 磁针已返回外部，物理模拟恢复';
                    statusBar.classList.add('visible');
                    setTimeout(() => statusBar.classList.remove('visible'), 2200);
                } else {
                    const progress = animState.transitionProgress;
                    const easedProgress = easeInOutCubic(progress);
                    needleGroup.position.lerpVectors(animState.mergePos, animState.idlePos, easedProgress);
                    needleGroup.quaternion.slerpQuaternions(MERGED_QUAT, INITIAL_QUAT, easedProgress).normalize();
                    animState.earthOpacity = 0.25 + easedProgress * 0.75;
                }
            } else if (animState.current === 'merged') {
                animState.earthOpacity = 0.25;
                animState.flash = Math.max(0, animState.flash - dt * 1.8);
                if (animState.flash > 0) {
                    centerSphere.scale.setScalar(1 + animState.flash * 3);
                    centerSphere.material.emissiveIntensity = 2.5 + animState.flash * 8;
                } else {
                    centerSphere.scale.lerp(new THREE.Vector3(1, 1, 1), 0.25);
                }
                needleGroup.position.copy(animState.mergePos);
                needleGroup.quaternion.copy(MERGED_QUAT);
            } else if (animState.current === 'idle') {
                animState.earthOpacity = 1.0;
                updateNeedlePhysics(dt);
            }

            fadeMats.forEach(mat => {
                if (!mat.transparent && animState.earthOpacity < 0.99) mat.transparent = true;
                const orig = origOpMap.get(mat) || 1;
                mat.opacity += (orig * animState.earthOpacity - mat.opacity) * 0.2;
                mat.needsUpdate = true;
            });

            if (time > 8 && hintTag.style.opacity !== '0') {
                hintTag.style.transition = 'opacity 2s';
                hintTag.style.opacity = '0';
                setTimeout(() => { if (hintTag.style.opacity === '0') hintTag.style.display = 'none'; }, 2100);
            }

            composer.render();
        }

        function updateFsIcon(f) { fsExpand.style.display = f ? 'none' : 'block';
            fsShrink.style.display = f ? 'block' : 'none'; }
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });
        document.addEventListener('fullscreenchange', () => updateFsIcon(!!document.fullscreenElement));
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / Math.max(window.innerHeight, 1);
            camera.updateProjectionMatrix();
        });
        window.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key === 'r') controls.autoRotate = !controls.autoRotate;
            if (key === 'f') { controls.target.set(0, 0.12, 0);
                camera.position.set(2.8, 1.3, 3.5);
                controls.update(); }
            if (key === 'm') {
                if (needleDragging) return;
                if (animState.current === 'idle') startTransitionIn();
                else if (animState.current === 'merged') startTransitionOut();
            }
        });

        updateBtnUI();
        animate();
    </script>
</body>
</html>
